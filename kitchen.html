<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Portal - Secure</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        #app-content { display: none; } /* Hidden until logged in */
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login-section">
        <h2>Kitchen Login</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button id="login-btn">Sign In</button>
    </div>

    <!-- Review Submission Section -->
    <div id="app-content">
        <h1>Submit Review</h1>
        <form id="review-form">
            <input type="text" id="food" placeholder="Food Name" required><br>
            <input type="number" id="rating" placeholder="Rating (1-10)" required><br>
            <textarea id="review" placeholder="Write your review..."></textarea><br>
            <button type="submit">Submit Review</button>
        </form>
        <button id="logout-btn">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLxHEYoivEZ1t0aRasBEt2CPVwxxYHgI8",
            authDomain: "howsdachow.firebaseapp.com",
            projectId: "howsdachow",
            storageBucket: "howsdachow.firebasestorage.app",
            messagingSenderId: "738544239426",
            appId: "1:738544239426:web:1e5e76d0459ac17d3dfedb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Handle Login
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Login Failed: " + err.message));
        };

        // Handle Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('app-content').style.display = 'none';
            }
        });

        // Logout
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Submit Review
        document.getElementById('review-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "reviews"), {
                food: document.getElementById('food').value,
                rating: document.getElementById('rating').value,
                text: document.getElementById('review').value,
                createdAt: new Date().toISOString(),
                author: auth.currentUser.email
            });
            alert("Review submitted!");
            document.getElementById('review-form').reset();
        });
    </script>
</body>
</html>
