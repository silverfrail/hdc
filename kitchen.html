<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen - Submit Review</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>
    <h1>Kitchen Portal</h1>
    <form id="review-form">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="food" placeholder="Food Name" required>
        <input type="number" id="rating" placeholder="Rating (1-10)" required>
        <textarea id="review" placeholder="Write your review..."></textarea>
        <button type="submit">Submit Review</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLxHEYoivEZ1t0aRasBEt2CPVwxxYHgI8",
            authDomain: "howsdachow.firebaseapp.com",
            projectId: "howsdachow",
            storageBucket: "howsdachow.firebasestorage.app",
            messagingSenderId: "738544239426",
            appId: "1:738544239426:web:1e5e76d0459ac17d3dfedb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('review-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "reviews"), {
                name: document.getElementById('name').value,
                food: document.getElementById('food').value,
                rating: document.getElementById('rating').value,
                text: document.getElementById('review').value,
                createdAt: new Date().toISOString()
            });
            alert("Review submitted!");
            document.getElementById('review-form').reset();
        });
    </script>
</body>
</html>
