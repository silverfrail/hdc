<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Feed</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        .controls { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        /* The Switch */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #007bff; }
        input:checked + .slider:before { transform: translateX(26px); }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; cursor: pointer; color: #007bff; }
    </style>
</head>
<body>
    <h1>Food Reviews</h1>
    <div class="controls">
        <span>1-10</span>
        <label class="switch">
            <input type="checkbox" id="mode-toggle" onchange="renderTable()">
            <span class="slider"></span>
        </label>
        <span>Normalize to 1-100</span>
    </div>

    <table>
        <thead>
            <tr>
                <th onclick="sortData('createdAt')">Date</th>
                <th onclick="sortData('name')">Name</th>
                <th onclick="sortData('food')">Food</th>
                <th onclick="sortData('rating')">Rating</th>
                <th>Review</th>
            </tr>
        </thead>
        <tbody id="feed-body"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLxHEYoivEZ1t0aRasBEt2CPVwxxYHgI8",
            authDomain: "howsdachow.firebaseapp.com",
            projectId: "howsdachow",
            storageBucket: "howsdachow.firebasestorage.app",
            messagingSenderId: "738544239426",
            appId: "1:738544239426:web:1e5e76d0459ac17d3dfedb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allReviews = [];

        async function loadReviews() {
            const querySnapshot = await getDocs(collection(db, "reviews"));
            allReviews = [];
            querySnapshot.forEach((doc) => allReviews.push(doc.data()));
            renderTable();
        }

        window.renderTable = () => {
            const is100Mode = document.getElementById('mode-toggle').checked;
            const tableBody = document.getElementById('feed-body');
            tableBody.innerHTML = "";
            
            allReviews.forEach(item => {
                let displayRating = item.rating;
                let displayScale = item.scale;

                if (is100Mode && item.scale == 10) {
                    displayRating = item.rating * 10;
                    displayScale = 100;
                }

                tableBody.innerHTML += `<tr>
                    <td>${item.createdAt ? item.createdAt.substring(0, 10) : 'N/A'}</td>
                    <td>${item.name}</td>
                    <td>${item.food}</td>
                    <td>${displayRating} / ${displayScale}</td>
                    <td>${item.text}</td>
                </tr>`;
            });
        };

        window.sortData = (key) => {
            allReviews.sort((a, b) => {
                let valA = a[key] || "";
                let valB = b[key] || "";
                return valA > valB ? 1 : -1;
            });
            renderTable();
        };

        loadReviews();
    </script>
</body>
</html>
