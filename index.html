<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HowsDaChow Portal</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .hidden { display: none; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; background: #f9f9f9; }
        nav { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #333; }
        #feed-section { margin-top: 20px; }
    </style>
</head>
<body>

    <div id="feed-section">
        <h1>Latest Reviews</h1>
        <div id="reviews-list"></div>
    </div>

    <hr>

    <div id="auth-container">
        <div id="auth-view">
            <button onclick="toggleView('login-section')">Login / Register</button>
            
            <div id="login-section" class="hidden">
                <h2>Sign In / Register</h2>
                <input type="email" id="login-email" placeholder="Email"><br>
                <input type="password" id="login-password" placeholder="Password"><br>
                <button id="login-btn">Sign In</button>
                <button id="register-btn">Register New Account</button>
                <p><button onclick="toggleView('request-section')">Request Access</button></p>
            </div>

            <div id="request-section" class="hidden">
                <h2>Request Access</h2>
                <input type="email" id="req-email" placeholder="Email"><br>
                <button id="request-btn">Submit Request</button>
            </div>
        </div>

        <div id="app-content" class="hidden">
            <nav>
                <button id="admin-tab-btn" class="hidden" onclick="showTab('admin-tab')">Admin</button>
                <button onclick="logout()">Logout</button>
            </nav>

            <div id="review-submission">
                <h3>Submit a Review</h3>
                <input type="text" id="food" placeholder="Food Name"><br>
                <input type="number" id="rating" placeholder="Rating (1-10)"><br>
                <textarea id="review" placeholder="Write your review..."></textarea><br>
                <button id="submit-review-btn">Post Review</button>
            </div>

            <div id="admin-tab" class="hidden">
                <h3>Admin Panel</h3>
                <div id="requests-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, deleteDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // IMPORTANT: Change this email to YOUR email to enable Admin access
        const ADMIN_EMAIL = "YOUR_ACTUAL_EMAIL@example.com"; 
        const firebaseConfig = {
            apiKey: "AIzaSyCLxHEYoivEZ1t0aRasBEt2CPVwxxYHgI8",
            authDomain: "howsdachow.firebaseapp.com",
            projectId: "howsdachow",
            storageBucket: "howsdachow.firebasestorage.app",
            messagingSenderId: "738544239426",
            appId: "1:738544239426:web:1e5e76d0459ac17d3dfedb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onSnapshot(query(collection(db, "reviews"), orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById('reviews-list');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `<div class="card"><strong>${data.food}</strong> (${data.rating}/10)<p>${data.review}</p></div>`;
            });
        });

        window.toggleView = (id) => document.getElementById(id).classList.toggle('hidden');
        window.showTab = (tab) => document.getElementById(tab).classList.toggle('hidden');
        window.logout = () => signOut(auth);

        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value)
            .catch(e => alert(e.message));
        };

        document.getElementById('register-btn').onclick = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value)
            .catch(e => alert(e.message));
        };

        document.getElementById('request-btn').onclick = async () => {
            await addDoc(collection(db, "pending_requests"), { email: document.getElementById('req-email').value });
            alert("Request sent!");
        };

        document.getElementById('submit-review-btn').onclick = async () => {
            await addDoc(collection(db, "reviews"), {
                food: document.getElementById('food').value,
                rating: document.getElementById('rating').value,
                review: document.getElementById('review').value,
                createdAt: new Date()
            });
            alert("Review posted!");
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-tab-btn').classList.remove('hidden');
                    loadAdminData();
                }
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        function loadAdminData() {
            onSnapshot(collection(db, "pending_requests"), (snapshot) => {
                const list = document.getElementById('requests-list');
                list.innerHTML = '';
                snapshot.forEach(d => {
                    list.innerHTML += `<div class="card">${d.data().email} <button onclick="approve('${d.id}', '${d.data().email}')">Approve</button></div>`;
                });
            });
        }

        window.approve = async (id, email) => {
            await setDoc(doc(db, "authorized_users", email), { email: email });
            await deleteDoc(doc(db, "pending_requests", id));
        };
    </script>
</body>
</html>
