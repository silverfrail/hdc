<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Food Ratings</title>
    <style>
        /* Force all elements to calculate size including padding/borders */
        * { box-sizing: border-box; }

        :root {
            --bg-color: #0f172a; 
            --panel-bg: #1e293b;
            --primary-blue: #3b82f6; 
            --vibrant-green: #22c55e; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --mastered-gold: #f59e0b;
            --danger-red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: var(--primary-blue); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 20px;
            margin-bottom: 20px; 
            text-align: center; 
        }

        /* Hamburger and Menu Styles */
        .hamburger {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1002;
            background: var(--panel-bg);
            padding: 5px 15px;
            border-radius: 6px;
            border: 1px solid var(--primary-blue);
        }

        .backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }

        .backdrop.open { display: block; }

        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 250px;
            height: 100%;
            background: var(--panel-bg);
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            z-index: 1001;
            transition: right 0.3s ease;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-menu.open { right: 0; }

        .menu-btn {
            background: none;
            border: 1px solid var(--primary-blue);
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .menu-btn.danger {
            border-color: var(--danger-red);
        }

        .sub-menu {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding-left: 15px;
        }

        .sub-menu.open { display: flex; }

        /* Controls & Search */
        .controls { margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; max-width: 500px; }
        #search-bar { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--primary-blue); background: var(--panel-bg); color: white; width: 100%; }

        /* Admin Add Form */
        .admin-form-container {
            display: none; /* Controlled by Auth */
            background: var(--panel-bg);
            border: 1px solid var(--vibrant-green);
            border-radius: 8px;
            padding: 15px;
            width: 100%;
            flex-direction: column;
            gap: 10px;
        }
        .admin-form-container h3 { margin: 0 0 5px 0; color: var(--vibrant-green); font-size: 1rem; }
        .form-row { display: flex; gap: 10px; width: 100%; }
        .form-row input { background: var(--bg-color); border: 1px solid var(--text-muted); padding: 8px; border-radius: 4px; color: white; flex: 1; min-width: 0; }
        .form-row input[type="number"] { max-width: 80px; }
        .form-submit-btn { background: var(--vibrant-green); color: var(--bg-color); border: none; font-weight: bold; padding: 8px; border-radius: 4px; cursor: pointer; }

        /* Stats Blocks */
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { font-size: 1.1rem; font-weight: bold; padding: 8px 16px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.1); }
        #total-rated { color: var(--vibrant-green); background: rgba(34, 197, 94, 0.1); }
        #top-avg { color: var(--mastered-gold); background: rgba(245, 158, 11, 0.1); }

        /* Cards Layout */
        .tracker-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .family-card { background-color: var(--panel-bg); border-top: 4px solid var(--primary-blue); border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); align-self: start; }
        
        .family-card h2 { margin: 0; font-size: 1.1rem; color: var(--text-main); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .family-card h2::after { content: '▼'; font-size: 0.8rem; margin-left: 10px; }
        .family-card.open h2::after { content: '▲'; }

        .family-card.open .card-content { display: flex; }
        .card-content { display: none; flex-direction: column; }
        
        .sprite-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; padding: 5px 0; border-bottom: 1px solid #2d3748; gap: 10px; }
        .sprite-name { flex-grow: 1; font-size: 0.9rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 2px; }
        .sprite-name .sub-label { font-size: 0.75rem; color: #64748b; }
        
        .rating-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-blue);
            border: 1px solid var(--primary-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            min-width: 45px;
            text-align: center;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-red);
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 0 5px;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-bg);
            border: 2px solid var(--primary-blue);
            padding: 25px;
            border-radius: 8px;
            z-index: 2000;
            width: 300px;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .modal.open { display: flex; }
        .modal h2 { margin: 0; font-size: 1.2rem; color: var(--primary-blue); }
        .modal input { background: var(--bg-color); border: 1px solid var(--text-muted); padding: 8px; border-radius: 4px; color: white; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn { padding: 8px 15px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .modal-btn.confirm { background: var(--primary-blue); color: white; }
        .modal-btn.cancel { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); }
    </style>
</head>
<body>

    <div class="hamburger" id="hamburger">☰</div>
    <div class="backdrop" id="backdrop"></div>

    <div class="side-menu" id="side-menu">
        <button class="menu-btn" id="org-toggle">Organization Methods ▼</button>
        <div class="sub-menu" id="sub-menu">
            <button class="menu-btn" data-org="person">By Person</button>
            <button class="menu-btn" data-org="food">By Food</button>
            <button class="menu-btn" data-org="rating">By Rating</button>
            <button class="menu-btn" data-org="date">By Date</button>
        </div>
        <hr style="border: 0; border-top: 1px solid #2d3748; width: 100%; margin: 10px 0;">
        <button class="menu-btn" id="auth-menu-btn">Admin Login</button>
    </div>

    <h1>Squad Food Ratings</h1>

    <div class="controls">
        <input type="text" id="search-bar" placeholder="Search entries...">
        
        <form class="admin-form-container" id="add-rating-form">
            <h3>Add New Rating</h3>
            <div class="form-row">
                <input type="text" id="form-food" placeholder="Food/Restaurant Name" required>
            </div>
            <div class="form-row">
                <input type="number" id="form-rating" placeholder="1-100" min="1" max="100" required>
                <input type="date" id="form-date" required>
            </div>
            <button type="submit" class="form-submit-btn">Publish Score</button>
        </form>
    </div>

    <div class="stats">
        <div class="stat-box" id="total-rated">Total Ratings: 0</div>
        <div class="stat-box" id="top-avg">Highest Entry: --</div>
    </div>

    <div class="tracker-container" id="tracker"></div>

    <div class="modal" id="login-modal">
        <h2>Admin Login</h2>
        <input type="email" id="login-email" placeholder="Email Address" required>
        <input type="password" id="login-pass" placeholder="Password" required>
        <div class="modal-buttons">
            <button class="modal-btn cancel" id="login-cancel">Cancel</button>
            <button class="modal-btn confirm" id="login-submit">Login</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmQiwAV6xVLR1bOJYNeVM0Hkk-exY7DFY",
            authDomain: "hdchow.firebaseapp.com",
            projectId: "hdchow",
            storageBucket: "hdchow.firebasestorage.app",
            messagingSenderId: "1083177554710",
            appId: "1:1083177554710:web:ef51ceee2272078567f637"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentGroup = localStorage.getItem('foodTrackerLayout') || 'person';
        let rawRatings = [];
        let usersMap = {}; 
        let currentSquadUser = null;

        const hamburger = document.getElementById('hamburger');
        const sideMenu = document.getElementById('side-menu');
        const backdrop = document.getElementById('backdrop');
        const orgToggle = document.getElementById('org-toggle');
        const subMenu = document.getElementById('sub-menu');
        const authMenuBtn = document.getElementById('auth-menu-btn');
        const loginModal = document.getElementById('login-modal');
        const adminForm = document.getElementById('add-rating-form');
        const trackerContainer = document.getElementById('tracker');

        const toggleMenu = () => { sideMenu.classList.toggle('open'); backdrop.classList.toggle('open'); };
        hamburger.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);
        orgToggle.addEventListener('click', () => subMenu.classList.toggle('open'));

        document.querySelectorAll('.sub-menu .menu-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentGroup = e.target.getAttribute('data-org');
                localStorage.setItem('foodTrackerLayout', currentGroup);
                renderTracker();
                toggleMenu();
            });
        });

        document.getElementById('form-date').value = new Date().toISOString().split('T')[0];

        authMenuBtn.addEventListener('click', () => {
            if (currentSquadUser) {
                signOut(auth).then(() => toggleMenu());
            } else {
                loginModal.classList.add('open');
            }
        });
        document.getElementById('login-cancel').addEventListener('click', () => loginModal.classList.remove('open'));
        
        document.getElementById('login-submit').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                loginModal.classList.remove('open');
                document.getElementById('login-email').value = '';
                document.getElementById('login-pass').value = '';
                toggleMenu();
            } catch (err) {
                alert("Login Failed: " + err.message);
            }
        });

        onAuthStateChanged(auth, (user) => {
            currentSquadUser = user;
            if (user) {
                const baseName = usersMap[user.email] || user.email.split('@')[0];
                authMenuBtn.innerText = `Log Out (${baseName})`;
                authMenuBtn.classList.add('danger');
                adminForm.style.display = 'flex';
            } else {
                authMenuBtn.innerText = "Admin Login";
                authMenuBtn.classList.remove('danger');
                adminForm.style.display = 'none';
            }
            renderTracker();
        });

        adminForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentSquadUser) return;

            const foodName = document.getElementById('form-food').value.trim();
            const rating = parseInt(document.getElementById('form-rating').value);
            const date = document.getElementById('form-date').value;

            try {
                await addDoc(collection(db, "ratings"), {
                    userId: currentSquadUser.uid,
                    userEmail: currentSquadUser.email,
                    foodName: foodName,
                    rating: rating,
                    date: date,
                    timestamp: new Date().getTime()
                });
                document.getElementById('form-food').value = '';
                document.getElementById('form-rating').value = '';
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            } catch (err) {
                alert("Error writing entry: " + err.message);
            }
        });

        // Restricted Delete Logic
        window.deleteEntry = async (id, ownerId) => {
            if (!currentSquadUser || currentSquadUser.uid !== ownerId) {
                alert("You are not the owner of this entry!");
                return;
            }
            if (confirm("Are you sure you want to permanently delete this rating?")) {
                try {
                    await deleteDoc(doc(db, "ratings", id));
                } catch (err) {
                    alert("Delete failed: " + err.message);
                }
            }
        };

        onSnapshot(collection(db, "users"), (snapshot) => {
            usersMap = {};
            snapshot.forEach(doc => {
                usersMap[doc.id] = doc.data().name;
            });
            renderTracker();
        });

        const qRatings = query(collection(db, "ratings"), orderBy("date", "desc"));
        onSnapshot(qRatings, (snapshot) => {
            rawRatings = [];
            snapshot.forEach(doc => {
                rawRatings.push({ id: doc.id, ...doc.data() });
            });
            updateStats();
            renderTracker();
        });

        const updateStats = () => {
            document.getElementById('total-rated').innerText = `Total Ratings: ${rawRatings.length}`;
            if (rawRatings.length > 0) {
                const topRating = [...rawRatings].sort((a,b) => b.rating - a.rating)[0];
                document.getElementById('top-avg').innerText = `Highest: ${topRating.rating} (${topRating.foodName})`;
            } else {
                document.getElementById('top-avg').innerText = "Highest: --";
            }
        };

        const renderTracker = () => {
            trackerContainer.innerHTML = '';
            let groups = {};

            const getAuthorName = (item) => usersMap[item.userEmail] || item.userEmail.split('@')[0];

            if (currentGroup === 'person') {
                rawRatings.forEach(item => {
                    const name = getAuthorName(item);
                    if (!groups[name]) groups[name] = [];
                    groups[name].push({ label: item.foodName, sub: item.date, rating: item.rating, id: item.id, owner: item.userId });
                });
            } else if (currentGroup === 'food') {
                rawRatings.forEach(item => {
                    const title = item.foodName;
                    if (!groups[title]) groups[title] = [];
                    groups[title].push({ label: getAuthorName(item), sub: item.date, rating: item.rating, id: item.id, owner: item.userId });
                });
            } else if (currentGroup === 'rating') {
                const brackets = ["100-90", "89-80", "79-70", "69-60", "59-50", "Below 50"];
                brackets.forEach(b => groups[b] = []);
                rawRatings.forEach(item => {
                    let b = "Below 50";
                    if (item.rating >= 90) b = "100-90"; else if (item.rating >= 80) b = "89-80"; else if (item.rating >= 70) b = "79-70"; else if (item.rating >= 60) b = "69-60"; else if (item.rating >= 50) b = "59-50";
                    groups[b].push({ label: `${item.foodName} (${getAuthorName(item)})`, sub: item.date, rating: item.rating, id: item.id, owner: item.userId });
                });
            } else if (currentGroup === 'date') {
                rawRatings.forEach(item => {
                    if (!item.date) return;
                    const dateParts = item.date.split('-');
                    const title = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    if (!groups[title]) groups[title] = [];
                    groups[title].push({ label: `${item.foodName} - ${getAuthorName(item)}`, sub: item.date, rating: item.rating, id: item.id, owner: item.userId });
                });
            }

            Object.keys(groups).forEach(groupTitle => {
                if (groups[groupTitle].length === 0 && currentGroup !== 'rating') return;
                const card = document.createElement('div');
                card.className = 'family-card';
                card.innerHTML = `<h2>${groupTitle}</h2><div class="card-content"></div>`;
                card.querySelector('h2').addEventListener('click', () => card.classList.toggle('open'));
                const contentWrapper = card.querySelector('.card-content');
                groups[groupTitle].sort((a,b) => b.rating - a.rating).forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'sprite-row';
                    
                    // Only show delete button if user is logged in AND is the owner
                    const isOwner = currentSquadUser && item.owner === currentSquadUser.uid;
                    const deleteElement = isOwner ? `<button class="delete-btn" onclick="deleteEntry('${item.id}', '${item.owner}')">×</button>` : '';

                    row.innerHTML = `
                        <div class="sprite-name">
                            <span>${item.label}</span>
                            <span class="sub-label">${item.sub}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="rating-badge">${item.rating}</span>
                            ${deleteElement}
                        </div>
                    `;
                    contentWrapper.appendChild(row);
                });
                trackerContainer.appendChild(card);
            });
        };
    </script>
</body>
</html>
