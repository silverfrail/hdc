<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Tracker</title>
    <style>
        /* Force all elements to calculate size including padding/borders */
        * { box-sizing: border-box; }

        :root {
            --bg-color: #0f172a; 
            --panel-bg: #1e293b;
            --primary-blue: #0000FF; 
            --vibrant-green: #5CFF5C; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --mastered-gold: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Responsive Wrapper to sync width of Header and Video */
        .content-wrapper {
            width: 64%;
            max-width: 800px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Mobile adjustment to shrink the video significantly */
        @media (max-width: 600px) {
            .content-wrapper {
                width: 50%;
                min-width: 200px;
            }
        }

        /* Hamburger and Menu Styles */
        .hamburger {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1002;
            background: var(--panel-bg);
            padding: 5px 15px;
            border-radius: 6px;
            border: 1px solid var(--primary-blue);
        }

        .backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }

        .backdrop.open { display: block; }

        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 250px;
            height: 100%;
            background: var(--panel-bg);
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            z-index: 1001;
            transition: right 0.3s ease;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-menu.open { right: 0; }

        .menu-btn {
            background: none;
            border: 1px solid var(--primary-blue);
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .sub-menu {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding-left: 15px;
        }

        .sub-menu.open { display: flex; }

        .channel-header { margin-top: 15px; width: 100%; text-align: center; }
        .channel-header a { 
            display: inline-block; 
            max-width: 100%;
            color: #3b82f6; 
            font-weight: bold; 
            font-size: 0.8rem; 
            text-decoration: none; 
            border: 1px solid var(--primary-blue); 
            padding: 5px 10px; 
            border-radius: 6px; 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stream-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--primary-blue);
        }

        .stream-container iframe { width: 100%; height: 100%; display: block; }

        h1 { color: #3b82f6; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; text-align: center; }

        .controls { margin-bottom: 20px; display: flex; justify-content: center; width: 100%; }
        #search-bar { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--primary-blue); background: var(--panel-bg); color: white; width: 100%; max-width: 300px; }

        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { font-size: 1.1rem; font-weight: bold; padding: 8px 16px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.1); }
        #collected-count { color: var(--vibrant-green); background: rgba(92, 255, 92, 0.1); }
        #mastered-count { color: var(--mastered-gold); background: rgba(245, 158, 11, 0.1); }

        .tracker-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .family-card { background-color: var(--panel-bg); border-top: 4px solid var(--primary-blue); border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); }
        
        .family-card h2 { margin: 0; font-size: 1.1rem; color: var(--text-main); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .family-card h2::after { content: '▼'; font-size: 0.8rem; margin-left: 10px; }
        .family-card.open h2::after { content: '▲'; }

        .family-card.open .card-content { display: flex; }
        .card-content { display: none; flex-direction: column; }
        .sprite-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; padding: 5px 0; border-bottom: 1px solid #2d3748; }
        .sprite-name { flex-grow: 1; font-size: 0.9rem; color: var(--text-muted); }
        
        input[type="checkbox"] { appearance: none; width: 20px; height: 20px; border: 2px solid var(--primary-blue); border-radius: 4px; cursor: pointer; position: relative; }
        input[type="checkbox"].mastered-check { border-color: var(--mastered-gold); }
        input[type="checkbox"]:checked { background-color: var(--primary-blue); }
        input[type="checkbox"].mastered-check:checked { background-color: var(--mastered-gold); border-color: var(--mastered-gold); }
        input[type="checkbox"]:checked::after { content: '✓'; position: absolute; color: white; top: -1px; left: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hamburger" id="hamburger">☰</div>
    <div class="backdrop" id="backdrop"></div>

    <div class="side-menu" id="side-menu">
        <button class="menu-btn" id="export-btn">Export Data</button>
        <button class="menu-btn" id="import-btn">Import Data</button>
        <button class="menu-btn" id="org-toggle">Organization Methods ▼</button>
        <div class="sub-menu" id="sub-menu">
            <button class="menu-btn" onclick="setGroup('family')">By Family</button>
            <button class="menu-btn" onclick="setGroup('version')">By Version</button>
            <button class="menu-btn" onclick="setGroup('owned')">By Owned</button>
            <button class="menu-btn" onclick="setGroup('mastered')">By Mastered</button>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="stream-container">
            <iframe src="https://player.twitch.tv/?channel=silverfrailttv&parent=silverfrail.github.io" frameborder="0" allowfullscreen="true" scrolling="no"></iframe>
        </div>
        
        <div class="channel-header">
            <a href="https://www.twitch.tv/silverfrailttv" target="_blank">twitch.tv/silverfrailttv</a>
        </div>
    </div>

    <h1>Fortnite Sprite Tracker</h1>

    <div class="controls">
        <input type="text" id="search-bar" placeholder="Search sprites...">
        <input type="file" id="fileInput" style="display:none" accept=".json">
    </div>

    <div class="stats">
        <div class="stat-box" id="collected-count">Collected: 0 / 82</div>
        <div class="stat-box" id="mastered-count">Mastered: 0 / 82</div>
    </div>

    <div class="tracker-container" id="tracker"></div>

    <script>

                    { id: "galaxy_fishy", name: "Galaxy Fishy", owned: false, mastered: false }
                ] 
            },
            {

                sprites: [
                    { id: "striker", name: "Striker", owned: false, mastered: false },
                    { id: "gold_striker", name: "Gold Striker", owned: false, mastered: false },
                    { id: "gummy_striker", name: "Gummy Striker", owned: false, mastered: false },
                    { id: "galaxy_striker", name: "Galaxy Striker", owned: false, mastered: false },
                    { id: "holofoil_striker", name: "Holofoil Striker", owned: false, mastered: false }
                ] 
            },
            { 
                family: "Aura", 
                sprites: [
                    { id: "aura", name: "Aura", owned: false, mastered: false },
                    { id: "gold_aura", name: "Gold Aura", owned: false, mastered: false },
                    { id: "gummy_aura", name: "Gummy Aura", owned: false, mastered: false },
                    { id: "galaxy_aura", name: "Galaxy Aura", owned: false, mastered: false }
                ] 
            },
            { 
                family: "Boss", 
                sprites: [
                    { id: "boss", name: "Boss", owned: false, mastered: false },
                    { id: "gold_boss", name: "Gold Boss", owned: false, mastered: false },
                    { id: "gummy_boss", name: "Gummy Boss", owned: false, mastered: false },
                    { id: "galaxy_boss", name: "Galaxy Boss", owned: false, mastered: false }
                ] 
            },
            { 
                family: "Grim", 
                sprites: [
                    { id: "grim", name: "Grim", owned: false, mastered: false },
                    { id: "gold_grim", name: "Gold Grim", owned: false, mastered: false },
                    { id: "gummy_grim", name: "Gummy Grim", owned: false, mastered: false },
                    { id: "galaxy_grim", name: "Galaxy Grim", owned: false, mastered: false }
                ] 
            },
            { 
                family: "Air", 
                sprites: [
                    { id: "air", name: "Air", owned: false, mastered: false },
                    { id: "gold_air", name: "Gold Air", owned: false, mastered: false },
                    { id: "gummy_air", name: "Gummy Air", owned: false, mastered: false },
                    { id: "galaxy_air", name: "Galaxy Air", owned: false, mastered: false },
                    { id: "holofoil_air", name: "Holofoil Air", owned: false, mastered: false }
                ] 
            },
            { 
                family: "Seven", 
                sprites: [
                    { id: "seven", name: "Seven", owned: false, mastered: false },
                    { id: "gold_seven", name: "Gold Seven", owned: false, mastered: false },
                    { id: "gummy_seven", name: "Gummy Seven", owned: false, mastered: false },
                    { id: "galaxy_seven", name: "Galaxy Seven", owned: false, mastered: false },
                    { id: "holofoil_seven", name: "Holofoil Seven", owned: false, mastered: false }
                ] 
            }
        ];

        const totalSprites = spriteData.reduce((acc, f) => acc + f.sprites.length, 0);

        // --- MIGRATION SCRIPT ---
        // Runs invisibly on load to convert old "Name" saves to new "ID" saves
        function performMigration() {
            const rawData = localStorage.getItem('fortniteSpriteData');
            if (!rawData) return; 

            try {
                const parsedData = JSON.parse(rawData);
                const keys = Object.keys(parsedData);
                if (keys.length === 0) return;

                // Check if the first key is using the old format (capital letters or spaces)
                const firstKey = keys[0];
                const isOldFormat = firstKey.includes(' ') || firstKey !== firstKey.toLowerCase();

                if (isOldFormat) {
                    const migratedData = {};
                    for (const [oldName, status] of Object.entries(parsedData)) {
                        // Dynamically format old names into new IDs (e.g., "Vini Jr." -> "vini_jr")
                        const newId = oldName.toLowerCase().replace(/\./g, '').replace(/\s+/g, '_');
                        migratedData[newId] = status;
                    }
                    // Save the newly converted data directly back into storage
                    localStorage.setItem('fortniteSpriteData', JSON.stringify(migratedData));
                }
            } catch (e) {
                console.error("Migration failed:", e);
            }
        }

        const hamburger = document.getElementById('hamburger');
        const sideMenu = document.getElementById('side-menu');
        const backdrop = document.getElementById('backdrop');
        const orgToggle = document.getElementById('org-toggle');
        const subMenu = document.getElementById('sub-menu');

        const toggleMenu = () => {
            sideMenu.classList.toggle('open');
            backdrop.classList.toggle('open');
        };

        hamburger.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);
        orgToggle.addEventListener('click', () => subMenu.classList.toggle('open'));

        const setGroup = (val) => {
            currentGroup = val;
            localStorage.setItem('fortniteSpriteLayout', val);
            renderTracker();
            toggleMenu();
        };

        const updateStats = () => {
            let collected = 0, mastered = 0;
            spriteData.forEach(f => f.sprites.forEach(s => { if(s.owned) collected++; if(s.mastered) mastered++; }));
            document.getElementById('collected-count').innerText = `Collected: ${collected} / ${totalSprites}`;
            document.getElementById('mastered-count').innerText = `Mastered: ${mastered} / ${totalSprites}`;
        };

        const saveProgress = () => {
            const saveObj = {};
            // Changed from s.name to s.id for saving
            spriteData.forEach(f => f.sprites.forEach(s => saveObj[s.id] = { owned: s.owned, mastered: s.mastered }));
            localStorage.setItem('fortniteSpriteData', JSON.stringify(saveObj));
            updateStats();
        };

        const loadCorrectedProgress = () => {
            const savedData = localStorage.getItem('fortniteSpriteData');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                spriteData.forEach(f => f.sprites.forEach(s => { 
                    // Changed from parsed[s.name] to parsed[s.id] for loading
                    if (parsed[s.id]) { 
                        s.owned = parsed[s.id].owned; 
                        s.mastered = parsed[s.id].mastered; 
                    } 
                }));
            }
            currentGroup = localStorage.getItem('fortniteSpriteLayout') || 'family';
        };

        const applySearch = () => {
            const query = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('.family-card').forEach(card => {
                const rows = card.querySelectorAll('.sprite-row');
                let hasVisible = false;
                rows.forEach(row => {
                    const match = row.querySelector('.sprite-name').innerText.toLowerCase().includes(query);
                    row.style.display = match ? 'flex' : 'none';
                    if (match) hasVisible = true;
                });
                card.style.display = (hasVisible || query === '') ? 'block' : 'none';
                if (hasVisible && query !== '') card.classList.add('open');
            });
        };

        document.getElementById('search-bar').addEventListener('input', applySearch);

        const renderTracker = () => {
            const trackerContainer = document.getElementById('tracker');
            trackerContainer.innerHTML = '';
            let renderGroups = [];

            if (currentGroup === 'family') {
                renderGroups = spriteData.map(f => ({ title: f.family, items: f.sprites.map(s => ({ sprite: s, family: f.family })) }));
            } else if (currentGroup === 'version') {
                const vMap = { "Unique": [], "Base": [], "Gold": [], "Gummy": [], "Galaxy": [], "Holofoil": [], "Other": [] };
                spriteData.forEach(f => f.sprites.forEach(s => { 
                    const v = (f.family === "Unique") ? "Unique" : (s.name.split(' ')[0] || "Other");
                    const category = vMap[v] ? v : (v === s.name.split(' ')[0] ? "Base" : "Other");
                    vMap[category].push({ sprite: s, family: f.family });
                }));
                Object.keys(vMap).forEach(v => { if (vMap[v].length > 0) renderGroups.push({ title: v + " Variants", items: vMap[v] }); });
            } else if (currentGroup === 'mastered') {
                const mMap = { "Mastered": [], "Not Mastered": [] };
                spriteData.forEach(f => f.sprites.forEach(s => s.mastered ? mMap["Mastered"].push({ sprite: s, family: f.family }) : mMap["Not Mastered"].push({ sprite: s, family: f.family })));
                renderGroups.push({ title: "Mastered", items: mMap["Mastered"] }, { title: "Not Mastered", items: mMap["Not Mastered"] });
            } else {
                const oMap = { "Owned": [], "Not Owned": [] };
                spriteData.forEach(f => f.sprites.forEach(s => s.owned ? oMap["Owned"].push({ sprite: s, family: f.family }) : oMap["Not Owned"].push({ sprite: s, family: f.family })));
                renderGroups.push({ title: "Owned", items: oMap["Owned"] }, { title: "Not Owned", items: oMap["Not Owned"] });
            }

            renderGroups.forEach(group => {
                if (group.items.length === 0) return;
                const card = document.createElement('div');
                card.className = 'family-card';
                card.innerHTML = `<h2>${group.title}</h2><div class="card-content"></div>`;
                card.querySelector('h2').addEventListener('click', () => card.classList.toggle('open'));
                const container = card.querySelector('.card-content');

                group.items.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'sprite-row';
                    row.innerHTML = `<span class="sprite-name">${item.sprite.name}</span>
                                     <div style="display:flex; gap:10px;">
                                        <label class="checkbox-wrapper" style="display:flex; flex-direction:column; align-items:center;">
                                            <input type="checkbox" ${item.sprite.owned ? 'checked' : ''}>
                                            <span style="font-size:0.65rem; color:#94a3b8;">Owned</span>
                                        </label>
                                        <label class="checkbox-wrapper" style="display:flex; flex-direction:column; align-items:center;">
                                            <input type="checkbox" class="mastered-check" ${item.sprite.mastered ? 'checked' : ''}>
                                            <span style="font-size:0.65rem; color:#94a3b8;">Mastered</span>
                                        </label>
                                     </div>`;
                    
                    row.querySelectorAll('input')[0].addEventListener('change', (e) => { item.sprite.owned = e.target.checked; saveProgress(); });
                    row.querySelectorAll('input')[1].addEventListener('change', (e) => { item.sprite.mastered = e.target.checked; saveProgress(); });
                    container.appendChild(row);
                });
                trackerContainer.appendChild(card);
            });
            applySearch();
        };

        document.getElementById('export-btn').addEventListener('click', () => {
            const blob = new Blob([localStorage.getItem('fortniteSpriteData')], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'sprite-data.json'; a.click();
        });

        document.getElementById('import-btn').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { localStorage.setItem('fortniteSpriteData', ev.target.result); location.reload(); };
            reader.readAsText(e.target.files[0]);
        });

        // Run migration before loading progress
        performMigration();
        loadCorrectedProgress();
        renderTracker();
        updateStats();
    </script>
</body>
</html>
